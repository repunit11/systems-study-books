<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 520" role="img" aria-labelledby="title desc">
  <title id="title">Consumer failure paths</title>
  <desc id="desc">Diagram showing a consumer processing path from polling through side effect and commit, with retry, retry topic, and DLQ branches.</desc>
  <defs>
    <style>
      .box { fill: #eef3ff; stroke: #b8c8ea; stroke-width: 2; rx: 14; ry: 14; }
      .danger { fill: #fff1ee; stroke: #e1b8ab; stroke-width: 2; rx: 14; ry: 14; }
      .ok { fill: #f3f8f1; stroke: #9bbb95; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #faf1dc; stroke: #dcc989; stroke-width: 2; rx: 14; ry: 14; }
      .text { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 21px; fill: #2d3f50; }
      .small { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 18px; fill: #4d5968; }
      .main { stroke: #5f7fb7; stroke-width: 4; fill: none; marker-end: url(#arrowMain); }
      .branch { stroke: #b57a2b; stroke-width: 4; fill: none; marker-end: url(#arrowBranch); }
      .warn { stroke: #cc6e5d; stroke-width: 4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowWarn); }
    </style>
    <marker id="arrowMain" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7fb7"/>
    </marker>
    <marker id="arrowBranch" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b57a2b"/>
    </marker>
    <marker id="arrowWarn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cc6e5d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="520" fill="#ffffff"/>

  <rect class="box" x="55" y="170" width="170" height="74"/>
  <text class="text" x="104" y="214">Poll record</text>

  <rect class="box" x="305" y="170" width="185" height="74"/>
  <text class="text" x="354" y="214">Handler</text>

  <rect class="box" x="570" y="170" width="205" height="74"/>
  <text class="text" x="613" y="214">Side effect</text>

  <rect class="ok" x="860" y="170" width="190" height="74"/>
  <text class="text" x="895" y="214">Commit offset</text>

  <rect class="ok" x="1095" y="170" width="100" height="74"/>
  <text class="text" x="1124" y="214">Done</text>

  <path class="main" d="M225 207 H305"/>
  <path class="main" d="M490 207 H570"/>
  <path class="main" d="M775 207 H860"/>
  <path class="main" d="M1050 207 H1095"/>

  <rect class="danger" x="305" y="340" width="185" height="74"/>
  <text class="small" x="330" y="382">retry in process</text>

  <rect class="note" x="585" y="340" width="175" height="74"/>
  <text class="small" x="622" y="382">retry topic</text>

  <rect class="danger" x="870" y="340" width="170" height="74"/>
  <text class="small" x="930" y="382">DLQ</text>

  <rect class="note" x="1085" y="340" width="120" height="74"/>
  <text class="small" x="1116" y="382">redrive</text>

  <path class="branch" d="M397 244 V340"/>
  <path class="branch" d="M672 244 V340"/>
  <path class="branch" d="M955 244 V340"/>
  <path class="branch" d="M1040 377 H1085"/>

  <path class="warn" d="M672 170 V100 H955 V170"/>
  <text class="small" x="695" y="90">crash here - duplicate window if side effect already happened</text>

  <text class="small" x="302" y="445">Choose among immediate retry, delayed retry, and DLQ by failure type.</text>
</svg>
