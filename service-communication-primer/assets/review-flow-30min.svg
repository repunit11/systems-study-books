<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 360" role="img" aria-labelledby="title desc">
  <title id="title">30 minute review flow</title>
  <desc id="desc">Simple timeline for a 30 minute design review, showing success definition, critical path, failure rules, and ownership checks.</desc>
  <defs>
    <style>
      .stepA { fill: #eef3ff; stroke: #b8c8ea; stroke-width: 2; rx: 16; ry: 16; }
      .stepB { fill: #faf1dc; stroke: #dcc989; stroke-width: 2; rx: 16; ry: 16; }
      .stepC { fill: #fff1ee; stroke: #e1b8ab; stroke-width: 2; rx: 16; ry: 16; }
      .stepD { fill: #f3f8f1; stroke: #9bbb95; stroke-width: 2; rx: 16; ry: 16; }
      .text { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 22px; fill: #2d3f50; font-weight: 700; }
      .small { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 18px; fill: #4d5968; }
      .arrow { stroke: #5f7fb7; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7fb7"/>
    </marker>
  </defs>

  <rect width="1240" height="360" fill="#ffffff"/>

  <rect class="stepA" x="55" y="108" width="220" height="92"/>
  <text class="text" x="109" y="146">0-5 min</text>
  <text class="small" x="94" y="174">define success</text>

  <rect class="stepB" x="345" y="108" width="250" height="92"/>
  <text class="text" x="410" y="146">5-15 min</text>
  <text class="small" x="376" y="174">critical path vs async</text>

  <rect class="stepC" x="665" y="108" width="250" height="92"/>
  <text class="text" x="733" y="146">15-25 min</text>
  <text class="small" x="700" y="174">retry, timeout, ordering</text>

  <rect class="stepD" x="985" y="108" width="200" height="92"/>
  <text class="text" x="1030" y="146">25-30 min</text>
  <text class="small" x="1023" y="174">owner, alert, redrive</text>

  <path class="arrow" d="M275 154 H345"/>
  <path class="arrow" d="M595 154 H665"/>
  <path class="arrow" d="M915 154 H985"/>

  <text class="small" x="154" y="255">Move from user-visible meaning to failure ownership, not from transport preference to transport preference.</text>
</svg>
