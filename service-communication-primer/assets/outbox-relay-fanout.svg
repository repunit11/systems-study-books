<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 470" role="img" aria-labelledby="title desc">
  <title id="title">Outbox relay fan-out</title>
  <desc id="desc">Diagram showing orders table and outbox table on one side, relay in the middle, Kafka partitions and consumer groups on the other side.</desc>
  <defs>
    <style>
      .storage { fill: #f7f7f7; stroke: #8f98a3; stroke-width: 2; rx: 14; ry: 14; }
      .box { fill: #eef3ff; stroke: #b8c8ea; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #faf1dc; stroke: #dcc989; stroke-width: 2; rx: 14; ry: 14; }
      .done { fill: #f3f8f1; stroke: #9bbb95; stroke-width: 2; rx: 20; ry: 20; }
      .text { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 21px; fill: #2d3f50; }
      .small { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 18px; fill: #4d5968; }
      .sync { stroke: #5f7fb7; stroke-width: 4; fill: none; marker-end: url(#arrowSync); }
      .async { stroke: #b57a2b; stroke-width: 4; fill: none; marker-end: url(#arrowAsync); }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowSync" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7fb7"/>
    </marker>
    <marker id="arrowAsync" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b57a2b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="470" fill="#ffffff"/>

  <rect class="storage" x="70" y="90" width="220" height="76"/>
  <text class="text" x="123" y="136">Orders table</text>

  <rect class="storage" x="70" y="210" width="220" height="96"/>
  <text class="text" x="120" y="248">Outbox table</text>
  <text class="small" x="116" y="277">event_id, topic, key,</text>
  <text class="small" x="142" y="299">payload, status</text>

  <rect class="done" x="82" y="334" width="196" height="44"/>
  <text class="small" x="118" y="362">accepted already returned</text>

  <rect class="box" x="410" y="160" width="190" height="86"/>
  <text class="text" x="454" y="206">Outbox Relay</text>

  <rect class="box" x="735" y="126" width="220" height="156"/>
  <text class="text" x="815" y="162">Kafka</text>
  <rect class="storage" x="765" y="188" width="48" height="62"/>
  <rect class="storage" x="826" y="188" width="48" height="62"/>
  <rect class="storage" x="887" y="188" width="48" height="62"/>
  <text class="small" x="772" y="268">partitions</text>

  <rect class="note" x="712" y="50" width="266" height="52"/>
  <text class="small" x="758" y="82">relay lag can keep this empty</text>

  <rect class="box" x="1035" y="80" width="155" height="64"/>
  <text class="small" x="1065" y="118">email-group</text>

  <rect class="box" x="1035" y="176" width="155" height="64"/>
  <text class="small" x="1048" y="214">analytics-group</text>

  <rect class="box" x="1035" y="272" width="155" height="64"/>
  <text class="small" x="1058" y="310">search-group</text>

  <path class="sync" d="M180 166 V210"/>
  <path class="async" d="M290 258 H410"/>
  <path class="async" d="M600 203 H735"/>
  <path class="async dash" d="M845 282 V360"/>
  <path class="async" d="M955 112 H1035"/>
  <path class="async" d="M955 208 H1035"/>
  <path class="async" d="M955 304 H1035"/>

  <text class="small" x="324" y="245">pending rows</text>
  <text class="small" x="630" y="193">publish</text>
  <text class="small" x="780" y="358">append first,</text>
  <text class="small" x="780" y="380">consumer later</text>
</svg>
