<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 360" role="img" aria-labelledby="title desc">
  <title id="title">Four week roadmap</title>
  <desc id="desc">A four week adoption roadmap for applying the book to a real system.</desc>
  <defs>
    <style>
      .w1 { fill: #eef3ff; stroke: #b8c8ea; stroke-width: 2; rx: 16; ry: 16; }
      .w2 { fill: #faf1dc; stroke: #dcc989; stroke-width: 2; rx: 16; ry: 16; }
      .w3 { fill: #fff1ee; stroke: #e1b8ab; stroke-width: 2; rx: 16; ry: 16; }
      .w4 { fill: #f3f8f1; stroke: #9bbb95; stroke-width: 2; rx: 16; ry: 16; }
      .text { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 22px; fill: #2d3f50; font-weight: 700; }
      .small { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 18px; fill: #4d5968; }
      .arrow { stroke: #5f7fb7; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7fb7"/>
    </marker>
  </defs>

  <rect width="1240" height="360" fill="#ffffff"/>

  <rect class="w1" x="50" y="110" width="250" height="104"/>
  <text class="text" x="125" y="152">Week 1</text>
  <text class="small" x="95" y="181">critical path</text>
  <text class="small" x="97" y="205">response meaning</text>

  <rect class="w2" x="355" y="110" width="250" height="104"/>
  <text class="text" x="430" y="152">Week 2</text>
  <text class="small" x="404" y="181">owners, lag,</text>
  <text class="small" x="392" y="205">redrive inventory</text>

  <rect class="w3" x="660" y="110" width="250" height="104"/>
  <text class="text" x="735" y="152">Week 3</text>
  <text class="small" x="710" y="181">runbook for</text>
  <text class="small" x="700" y="205">one scary incident</text>

  <rect class="w4" x="965" y="110" width="225" height="104"/>
  <text class="text" x="1032" y="152">Week 4</text>
  <text class="small" x="1000" y="181">worksheet in</text>
  <text class="small" x="998" y="205">review or game day</text>

  <path class="arrow" d="M300 162 H355"/>
  <path class="arrow" d="M605 162 H660"/>
  <path class="arrow" d="M910 162 H965"/>

  <text class="small" x="350" y="286">Short repetition converts the book from knowledge into team habit.</text>
</svg>
