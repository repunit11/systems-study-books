<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 620" role="img" aria-labelledby="title desc">
  <title id="title">Incident decision flow</title>
  <desc id="desc">Decision flow for the first 15 to 30 minutes of an incident, separating business impact, sync path, async path, and immediate mitigation.</desc>
  <defs>
    <style>
      .box { fill: #eef3ff; stroke: #b8c8ea; stroke-width: 2; rx: 14; ry: 14; }
      .warn { fill: #fff1ee; stroke: #e1b8ab; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #faf1dc; stroke: #dcc989; stroke-width: 2; rx: 14; ry: 14; }
      .ok { fill: #f3f8f1; stroke: #9bbb95; stroke-width: 2; rx: 14; ry: 14; }
      .text { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 22px; fill: #2d3f50; font-weight: 700; }
      .small { font-family: DejaVu Sans, "Noto Sans CJK JP", sans-serif; font-size: 18px; fill: #4d5968; }
      .arrow { stroke: #5f7fb7; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .branch { stroke: #b57a2b; stroke-width: 4; fill: none; marker-end: url(#arrowBranch); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#5f7fb7"/>
    </marker>
    <marker id="arrowBranch" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b57a2b"/>
    </marker>
  </defs>

  <rect width="1240" height="620" fill="#ffffff"/>

  <rect class="box" x="470" y="42" width="300" height="78"/>
  <text class="text" x="525" y="89">user impact?</text>

  <rect class="box" x="130" y="185" width="320" height="92"/>
  <text class="text" x="208" y="227">sync path issue</text>
  <text class="small" x="176" y="255">payment, inventory, DB, queue wait</text>

  <rect class="box" x="790" y="185" width="320" height="92"/>
  <text class="text" x="870" y="227">async path issue</text>
  <text class="small" x="842" y="255">lag, DLQ, replay, schema, rebalance</text>

  <rect class="warn" x="90" y="360" width="200" height="84"/>
  <text class="small" x="132" y="398">degraded mode</text>
  <text class="small" x="125" y="422">breaker / pause</text>

  <rect class="warn" x="345" y="360" width="200" height="84"/>
  <text class="small" x="395" y="398">rollback</text>
  <text class="small" x="380" y="422">deploy / config</text>

  <rect class="note" x="600" y="360" width="200" height="84"/>
  <text class="small" x="650" y="398">redrive</text>
  <text class="small" x="618" y="422">after fix and sample</text>

  <rect class="note" x="855" y="360" width="200" height="84"/>
  <text class="small" x="912" y="398">pause / retry</text>
  <text class="small" x="915" y="422">topic control</text>

  <rect class="ok" x="455" y="518" width="330" height="64"/>
  <text class="small" x="500" y="556">record decision, owner, and next recovery step</text>

  <path class="arrow" d="M620 120 V185"/>
  <path class="branch" d="M620 159 C620 159, 320 159, 290 185"/>
  <path class="branch" d="M620 159 C620 159, 920 159, 950 185"/>

  <path class="arrow" d="M290 277 V360"/>
  <path class="arrow" d="M400 277 V360"/>
  <path class="arrow" d="M950 277 C950 277, 950 320, 700 360"/>
  <path class="arrow" d="M950 277 V360"/>

  <path class="arrow" d="M190 444 C190 444, 190 550, 455 550"/>
  <path class="arrow" d="M445 444 C445 444, 445 550, 455 550"/>
  <path class="arrow" d="M700 444 V518"/>
  <path class="arrow" d="M955 444 C955 444, 955 550, 785 550"/>

  <text class="small" x="79" y="77">First ask what users are seeing, then separate sync and async failure paths.</text>
</svg>
